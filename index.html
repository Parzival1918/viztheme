
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VizTheme Gallery</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a1a; padding: 2rem; }
        h1 { text-align: center; margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 2rem; }
        .card { background: white; padding: 1rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem;}
        .card-dark { background: #121212; color: #E0E0E0; }
        .card-dark h2 { border-bottom: 1px solid #2A2A2A; }
        img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>
    <h1>VizTheme Style Gallery</h1>
    <div class="grid">

        <div class="card">
            <h2>Light + Pastel</h2>
            <img src="images/light_pastel.svg" alt="light pastel plot">
        </div>
        
        <div class="card">
            <h2>Light + Okabe_Ito</h2>
            <img src="images/light_okabe_ito.svg" alt="light okabe_ito plot">
        </div>
        
        <div class="card">
            <h2>Light + Purple_Yellow</h2>
            <img src="images/light_purple_yellow.svg" alt="light purple_yellow plot">
        </div>
        
        <div class="card">
            <h2>Light + Neon</h2>
            <img src="images/light_neon.svg" alt="light neon plot">
        </div>
        
        <div class="card">
            <h2>Light + Grayscale</h2>
            <img src="images/light_grayscale.svg" alt="light grayscale plot">
        </div>
        
        <div class="card card-dark">
            <h2>Dark + Pastel</h2>
            <img src="images/dark_pastel.svg" alt="dark pastel plot">
        </div>
        
        <div class="card card-dark">
            <h2>Dark + Okabe_Ito</h2>
            <img src="images/dark_okabe_ito.svg" alt="dark okabe_ito plot">
        </div>
        
        <div class="card card-dark">
            <h2>Dark + Purple_Yellow</h2>
            <img src="images/dark_purple_yellow.svg" alt="dark purple_yellow plot">
        </div>
        
        <div class="card card-dark">
            <h2>Dark + Neon</h2>
            <img src="images/dark_neon.svg" alt="dark neon plot">
        </div>
        
        <div class="card card-dark">
            <h2>Dark + Grayscale</h2>
            <img src="images/dark_grayscale.svg" alt="dark grayscale plot">
        </div>
        
    </div>
</body>
</html>
